services:
  - type: web
    name: smart-restaurant-bot
    env: python
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.bot
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: smart-restaurant-db
          property: connectionString
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: USE_WEBHOOK
        value: "False"

databases:
  - name: smart-restaurant-db
    region: frankfurt
    databaseName: smart_restaurant
    user: admin
